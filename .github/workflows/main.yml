name: Build Android APK
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create build_dir com.rome432.snake "${{ github.event.client_payload.app_name }}"
          cd build_dir
          cordova platform add android
          
      - name: Prepare Web Files
        run: |
          # Очищаем стандартные файлы Cordova и вставляем твой код
          rm -rf build_dir/www/*
          echo "${{ github.event.client_payload.app_code }}" > build_dir/www/index.html

      - name: Build APK
        run: |
          cd build_dir
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
